<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake (C Backend + Web Frontend)</title>
  <style>
    body { background:#111; color:#fff; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial; display:flex; flex-direction:column; align-items:center; gap:12px; padding:24px; }
    .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    label { display:flex; gap:8px; align-items:center; }
    select, button, input { background:#1b1b1b; color:#fff; border:1px solid #444; padding:8px 10px; border-radius:8px; }
    button { cursor:pointer; }
    canvas { background:#000; border:1px solid #444; border-radius:10px; }
    .hint { color:#bbb; font-size:12px; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    #msg { color:#9ad; font-size:12px; min-height:16px; }
  </style>
</head>
<body>
  <h2>Snake</h2>

  <div class="bar">
    <div>Score: <span id="score">0</span></div>
    <label>
      難度
      <select id="difficulty">
        <option value="easy">簡單</option>
        <option value="normal" selected>普通</option>
        <option value="hard">困難</option>
      </select>
    </label>
    <button id="restart" type="button">重新開始 (R)</button>
  </div>

  <div class="hint">操作：方向鍵 / WASD。按 Space 暫停、R 重新開始。</div>
  <canvas id="cv" width="400" height="400"></canvas>

  <div class="row">
    <input id="name" placeholder="暱稱" maxlength="16" />
    <button id="submitScore" type="button">送出分數</button>
    <span id="msg"></span>
  </div>

  <pre id="leaderboard" style="width:400px; white-space:pre-wrap; background:#0b0b0b; border:1px solid #333; padding:10px; border-radius:10px;"></pre>

  <script src="/static/snake.js"></script>
</body>
</html>
